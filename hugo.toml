baseURL = "https://charles001.com/"
languageCode = "zh-cn"
title = "Charles 的博客"
theme = "PaperMod"

paginate = 10
summaryLength = 120
buildDrafts = false

[permalinks]
  posts = "/posts/:slug/"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "你好，朋友 👋"
    Content = "这里记录我的想法和文章！"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/你的GitHub用户名"

[[menu.main]]
  name = "文章"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "标签"
  url = "/tags/"
  weight = 2

[[menu.main]]
  name = "关于"
  url = "/about/"
  weight = 3

[markup]
  [markup.highlight]
    codeFences = true
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true